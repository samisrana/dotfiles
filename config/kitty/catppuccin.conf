# vim:ft=kitty
# Philadelphia Night — dark sky, electric blue, neon red, amber windows

# The basic colors
foreground              #C8D4E8
background              #090C12
selection_foreground    #C8D4E8
selection_background    #1A2D50

# Cursor colors
cursor                  #2A72FF
cursor_text_color       #090C12

# URL underline color when hovering with mouse
url_color               #5A9EFF

# kitty window border colors
active_border_color     #2A72FF
inactive_border_color   #2D3650
bell_border_color       #F0C040

# OS Window titlebar colors
wayland_titlebar_color system
macos_titlebar_color system

#: Tab bar colors
active_tab_foreground   #C8D4E8
active_tab_background   #090C12
inactive_tab_foreground #4A5870
inactive_tab_background #090C12
tab_bar_background      none

# Colors for marks (marked text in the terminal)
mark1_foreground #090C12
mark1_background #2A72FF
mark2_foreground #090C12
mark2_background #F0C040
mark3_foreground #090C12
mark3_background #40B8D8

#: The 16 terminal colors

#: black
color0 #1A1F2C
color8 #2D3650

#: red (neon signs)
color1 #CC2828
color9 #E03838

#: green (distant building lights)
color2  #30B870
color10 #40D080

#: yellow / amber (warm window glow)
color3  #C8A030
color11 #F0C040

#: blue (electric building highlights)
color4  #2A72FF
color12 #5A9EFF

#: magenta (purple city glow)
color5  #6644BB
color13 #8866DD

#: cyan (cool sky tones)
color6  #40B8D8
color14 #60D0F0

#: white
color7  #7A8FA8
color15 #C8D4E8
